<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apps Guru - Top 10 Ranking</title>
    <style>
        :root { --primary: #00d1b2; --dark: #121212; --card: #1e1e1e; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--dark); color: white; margin: 0; padding-bottom: 100px; }
        header { background: #000; padding: 20px; text-align: center; border-bottom: 3px solid var(--primary); }
        .container { max-width: 800px; margin: auto; padding: 20px; }
        
        /* App Card Style */
        .app-card { background: var(--card); border-radius: 12px; padding: 15px; margin-bottom: 15px; display: flex; align-items: center; border: 1px solid #333; position: relative; }
        .rank-tag { position: absolute; top: -5px; left: -5px; background: var(--primary); color: #000; padding: 2px 10px; border-radius: 5px; font-weight: bold; }
        .app-img { width: 70px; height: 70px; border-radius: 12px; margin-right: 15px; object-fit: cover; background: #333; }
        .app-info h3 { margin: 0; color: var(--primary); }
        .app-info p { margin: 5px 0; font-size: 14px; color: #aaa; }

        /* Admin Form Style (Bottom Sticky) */
        .admin-panel { position: fixed; bottom: 0; left: 0; right: 0; background: #222; padding: 15px; border-top: 2px solid var(--primary); display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; z-index: 100; }
        input, textarea { padding: 8px; border-radius: 5px; border: 1px solid #444; background: #333; color: white; font-size: 12px; }
        .add-btn { background: var(--primary); color: black; border: none; padding: 8px 20px; border-radius: 5px; cursor: pointer; font-weight: bold; }
        
        .copy-code-btn { background: #ffdd57; color: #000; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; font-size: 12px; }
    </style>
</head>
<body>

<header>
    <h1>📱 Apps Guru</h1>
</header>

<div class="container" id="listContainer">
    </div>

<div class="admin-panel">
    <input type="text" id="appName" placeholder="App Name (e.g. WhatsApp)">
    <input type="text" id="appImg" placeholder="Image URL (Google se link copy karein)">
    <textarea id="appDesc" placeholder="Short Description..."></textarea>
    <button class="add-btn" onclick="addApp()">Add to List</button>
    <button class="copy-code-btn" onclick="getFinalCode()">Get Code for GitHub</button>
</div>

<script>
    let apps = [];

    // 1. App ko Screen par dikhane ka function
    function render() {
        const container = document.getElementById('listContainer');
        container.innerHTML = "";
        apps.forEach((app, index) => {
            container.innerHTML += `
                <div class="app-card">
                    <div class="rank-tag">#${index + 1}</div>
                    <img src="${app.img}" class="app-img">
                    <div class="app-info">
                        <h3>${app.name}</h3>
                        <p>${app.desc}</p>
                    </div>
                </div>
            `;
        });
    }

    // 2. Form se data pakadne ka function
    function addApp() {
        const name = document.getElementById('appName').value;
        const img = document.getElementById('appImg').value || 'https://via.placeholder.com/70';
        const desc = document.getElementById('appDesc').value;

        if(name && desc) {
            apps.push({ name, img, desc });
            render();
            // Clear inputs
            document.getElementById('appName').value = "";
            document.getElementById('appDesc').value = "";
            document.getElementById('appImg').value = "";
        } else {
            alert("Bhai, Naam aur Description to likho!");
        }
    }

    // 3. Sab se zaroori: GitHub par save karne ke liye code nikalna
    function getFinalCode() {
        console.log("Current Apps JSON:", JSON.stringify(apps));
        alert("Bhai, niche console mein code aa gaya hai. Lekin asan tarika ye hai ke aap bas ye list copy karein.");
    }
</script>

</body>
</html>
