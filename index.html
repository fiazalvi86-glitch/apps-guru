<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Apps Guru - Top 10 Apps</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #00a4ef; --bg: #000000; --card: #121212; }
        
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Roboto', sans-serif; background: var(--bg); color: white; margin: 0; padding: 0; overflow-x: hidden; }

        header { background: #111; padding: 15px; text-align: center; border-bottom: 1px solid #333; position: sticky; top: 0; z-index: 1000; }
        .logo { font-size: 22px; font-weight: bold; color: var(--primary); letter-spacing: 1px; }

        .container { width: 100%; max-width: 500px; margin: auto; padding: 10px; }

        /* App Card Style - 90% Mobile Optimized */
        .app-card { 
            background: var(--card); 
            border-radius: 12px; 
            padding: 12px; 
            margin-bottom: 12px; 
            display: flex; 
            align-items: center; 
            border: 1px solid #222;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }

        .rank-num { 
            font-size: 18px; 
            font-weight: bold; 
            color: #888; 
            width: 30px; 
            text-align: center;
            margin-right: 10px;
        }

        .app-img { 
            width: 60px; 
            height: 60px; 
            border-radius: 12px; 
            margin-right: 15px; 
            object-fit: cover;
            background: #222;
            border: 1px solid #333;
        }

        .app-info { flex: 1; }
        .app-info h3 { margin: 0; font-size: 17px; color: #fff; text-transform: capitalize; }
        .app-info p { margin: 3px 0 0; font-size: 13px; color: #999; line-height: 1.3; }

        /* Bottom Bulk Panel - Simple & Clean */
        .admin-panel { 
            position: fixed; 
            bottom: 0; 
            left: 0; 
            right: 0; 
            background: #111; 
            padding: 15px; 
            border-top: 1px solid #333;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        textarea { 
            width: 100%; 
            height: 50px; 
            background: #222; 
            border: 1px solid #444; 
            border-radius: 8px; 
            color: white; 
            padding: 10px; 
            font-size: 14px; 
            resize: none;
        }

        .btn-gen { 
            background: var(--primary); 
            color: white; 
            border: none; 
            padding: 12px; 
            border-radius: 8px; 
            font-weight: bold; 
            font-size: 15px; 
            cursor: pointer;
        }

        .btn-gen:active { transform: scale(0.98); opacity: 0.9; }

        .placeholder-text { text-align: center; color: #555; margin-top: 100px; font-size: 14px; }
    </style>
</head>
<body>

<header>
    <div class="logo">APPS GURU</div>
</header>

<div class="container" id="listContainer">
    <div class="placeholder-text">Enter apps below separated by commas <br> (e.g. WhatsApp, Facebook, TikTok)</div>
</div>

<div class="admin-panel">
    <textarea id="bulkInput" placeholder="Enter app names here..."></textarea>
    <button class="btn-gen" onclick="generateList()">Generate Top 10 List</button>
</div>

<script>
    function generateList() {
        const input = document.getElementById('bulkInput').value;
        const container = document.getElementById('listContainer');
        
        if(!input.trim()) return;

        const apps = input.split(',').map(a => a.trim()).filter(a => a !== "");
        container.innerHTML = "";

        apps.forEach((name, index) => {
            // MAGIC: Google Play Store ka official Icon search link
            // Agar exact icon na mila, to ye Play Store ka default bag icon dikhayega
            const playStoreIcon = `https://www.gstatic.com/android/market_images/web/play_prism_h_60.png`; 
            
            // Behtar image fetcher (Google search favicon trick)
            const googleIcon = `https://www.google.com/s2/favicons?sz=128&domain=${name}.com`;

            container.innerHTML += `
                <div class="app-card">
                    <div class="rank-num">${index + 1}</div>
                    <img src="${googleIcon}" class="app-img" onerror="this.src='${playStoreIcon}'">
                    <div class="app-info">
                        <h3>${name}</h3>
                        <p>High performance app with top user ratings. Essential for your daily digital life.</p>
                    </div>
                </div>
            `;
        });

        document.getElementById('bulkInput').value = "";
    }
</script>

</body>
</html>
